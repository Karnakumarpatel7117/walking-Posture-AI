      User:     ({c="w-5 h-5"}) => <SvgIcon cls={c} d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/>,

      Video:    ({c="w-5 h-5"}) => <SvgIcon cls={c} d="M15 10l4.55-2.28A1 1 0 0121 8.72v6.56a1 1 0 01-1.45.89L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>,
      Zap:      ({c="w-5 h-5"}) => <SvgIcon cls={c} d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>,
      Refresh:  ({c="w-5 h-5"}) => <SvgIcon cls={c} d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>,
      Alert:    ({c="w-5 h-5"}) => <SvgIcon cls={c} d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0zM12 9v4M12 17h.01"/>,

      Eye:      ({c="w-4 h-4"}) => <SvgIcon cls={c} d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 100 6 3 3 0 000-6z"/>,
      EyeOff:   ({c="w-4 h-4"}) => <SvgIcon cls={c} d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M10 10a2 2 0 104 4M1 1l22 22"/>,
      Check:    ({c="w-4 h-4"}) => <SvgIcon cls={c} d="M22 11.08V12a10 10 0 11-5.93-9.14M22 4L12 14.01l-3-3"/>,
      Clock:    ({c="w-3 h-3"}) => <SvgIcon cls={c} d="M12 2a10 10 0 100 20A10 10 0 0012 2zM12 6v6l4 2"/>,
      Right:    ({c="w-4 h-4"}) => <SvgIcon cls={c} d="M9 18l6-6-6-6"/>,
    };

    /* ─── Constants ─── */
    const PROVIDERS = [
      { id: "openai",  label: "OpenAI",        hint: "sk-...",    color: "text-green-400",  border: "border-green-500",  bg: "bg-green-500/10"  },
      { id: "groq",    label: "Groq",          hint: "gsk_...",   color: "text-orange-400", border: "border-orange-500", bg: "bg-orange-500/10" },
      { id: "gemini",  label: "Google Gemini", hint: "AIzaSy...", color: "text-blue-400",   border: "border-blue-500",   bg: "bg-blue-500/10"   },
    ];

        { id: "gpt-4o",       label: "GPT-4o (Recommended)" },
        { id: "gpt-4o-mini",  label: "GPT-4o Mini (Cheaper)" },
        { id: "gpt-4-turbo",  label: "GPT-4 Turbo"          },
      ],
      groq: [
        { id: "llama-3.2-90b-vision-preview", label: "Llama 3.2 90B Vision (Recommended)" },
        { id: "llama-3.2-11b-vision-preview", label: "Llama 3.2 11B Vision (Faster)"      },
      ],
      gemini: [
        { id: "gemini-2.0-flash", label: "Gemini 2.0 Flash (Recommended)" },
        { id: "gemini-1.5-pro",   label: "Gemini 1.5 Pro (More Detailed)" },
        { id: "gemini-1.5-flash", label: "Gemini 1.5 Flash (Faster)"      },
      ],
    };
    const VIEW_TYPES = ["Side View (Left)","Side View (Right)","Front View","Back View","Diagonal View"];
    const MAX_MB = 50;

    /* ─── Prompts ─── */
    function fullReportPrompt(name, file, view, custom) {
      return `You are an expert Clinical Biomechanist, Gait Analyst, and Physical Therapist.
Analyze the provided walking video frames and generate a posture/gait report based ONLY on what is actually visible.

Rules:
- Do not use sample data or invent findings.
- If not clearly visible, say: "Not confidently visible from this video angle."
- Use language like "may", "could", "suggests", "possible".
- Do not diagnose medical conditions.
- If video quality is poor, say so clearly.

Profile: ${name||"Unknown"}  |  File: ${file}  |  View: ${view}
Instructions: ${custom||"Standard gait analysis"}

Produce this full report in clean markdown:

# Walking Posture & Gait Analysis Report

## 1. Final AI Summary
3–4 sentence summary of observed walking posture and gait quality.

## 2. Overall Walking Classification
Classify the visible walking pattern (Normal / Mild forward head posture / Reduced arm swing / Mild trunk sway / Possible pelvic instability / etc.)

## 3. Ranked Body Section Assessment
Rank from weakest to strongest. For each section:
### [Section Name]
**Status:** Good / Needs Attention / Not Confidently Visible
**Score:** X/10 (only if confident)
**Observed:** What was seen
**Why It Matters:** Clinical relevance
**Corrective Cue:** One practical tip

Sections: Head & Neck Alignment, Shoulder Position, Arm Swing Symmetry, Trunk Stability, Pelvic Control, Knee Tracking, Foot Progression Angle, Step Symmetry, Cadence Efficiency

## 4. Key Problems Detected
**Problem:** Name | **Severity:** Low / Moderate / High
**Observed:** Description
**Possible Root Causes:** Brief list
**Corrective Cue:** Action tip

## 5. Future Risk Forecast
- **Short-term (weeks):** Possible risks
- **Medium-term (months):** Possible risks
- **Long-term (years):** Possible risks

## 6. Step-by-Step Improvement Plan
- **Week 1–2:** Awareness and mobility
- **Week 3–4:** Strength and stability
- **Week 5–8:** Walking retraining

## 7. Exercise Plan
3–5 exercises:
**Exercise:** Name | **Purpose:** Why | **Dosage:** Sets/reps | **How:** Simple instructions

## 8. AI Confidence Level
**Level:** High / Moderate / Low
**Reason:** Explanation

Return clean markdown only.`;
    }

    function quickCoachPrompt(name, file, view, custom) {
      return `You are a real-time AI walking posture coach. Analyze the provided walking video frames.
Rules: Exactly 2–3 sentences. Address as "You". Mention: "${file}". Give 1–2 corrective cues. No markdown. No invented issues. If visibility poor, say so.
Profile: ${name||"Unknown"} | View: ${view} | Instructions: ${custom||"Quick coaching"}
Return only the coaching paragraph.`;
    }

    /* ─── Frame Extraction (for OpenAI) ─── */
    function extractFrames(file, numFrames, onProgress) {
      return new Promise((resolve, reject) => {
        const video  = document.createElement("video");
        const canvas = document.createElement("canvas");
        const ctx    = canvas.getContext("2d");
        const frames = [];
        video.muted  = true;
        video.preload = "auto";
        video.src    = URL.createObjectURL(file);

        video.addEventListener("loadedmetadata", () => {
          const W = Math.min(video.videoWidth, 640);
          const H = Math.round(W * video.videoHeight / video.videoWidth);
          canvas.width = W; canvas.height = H;
          const dur = video.duration;
          const times = Array.from({length: numFrames}, (_, i) =>
            (i / (numFrames - 1)) * dur * 0.95
          );
          let idx = 0;
          const next = () => { video.currentTime = times[idx]; };
          video.addEventListener("seeked", () => {
            ctx.drawImage(video, 0, 0, W, H);
            frames.push(canvas.toDataURL("image/jpeg", 0.7).split(",")[1]);
            onProgress(10 + Math.round((idx / numFrames) * 30), `Extracting frame ${idx+1}/${numFrames}...`);
            idx++;
            if (idx < times.length) next(); else resolve(frames);
          });
          next();
        });
        video.addEventListener("error", () => reject(new Error("Failed to read video frames.")));
      });
    }

    /* ─── OpenAI-compatible Analysis (OpenAI + Groq share this) ─── */
    async function analyzeWithOpenAICompat(file, prompt, model, apiKey, endpoint, providerName, numFrames, onProgress) {
      onProgress(5, "Extracting video frames...");
      const frames = await extractFrames(file, numFrames, onProgress);

      onProgress(45, `Sending frames to ${providerName}...`);
      const content = [
        { type: "text", text: prompt },
        ...frames.map(f => ({
          type: "image_url",
          image_url: { url: `data:image/jpeg;base64,${f}`, detail: "low" }
        }))
      ];

      const res = await fetch(endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model,
          messages: [{ role: "user", content }],
          max_tokens: 4096,
        }),
      });

      onProgress(88, "Generating report...");
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `${providerName} error (${res.status}) — check your API key.`);
      }
      const data = await res.json();
      const text = data.choices?.[0]?.message?.content;
      if (!text) throw new Error(`No analysis returned from ${providerName}.`);
      return text;
    }

    const analyzeWithOpenAI = (file, prompt, model, apiKey, onProgress) =>
      analyzeWithOpenAICompat(file, prompt, model, apiKey,
        "https://api.openai.com/v1/chat/completions", "OpenAI", 16, onProgress);

    const analyzeWithGroq = (file, prompt, model, apiKey, onProgress) =>
      analyzeWithOpenAICompat(file, prompt, model, apiKey,
        "https://api.groq.com/openai/v1/chat/completions", "Groq", 8, onProgress);

    /* ─── Gemini Analysis (inline base64) ─── */
    function readBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result.split(",")[1]);
        reader.onerror = () => reject(new Error("Could not read video file."));
        reader.readAsDataURL(file);
      });
    }

    async function analyzeWithGemini(file, prompt, model, apiKey, onProgress) {
      const mb = file.size / 1024 / 1024;
      if (mb > MAX_MB) throw new Error(`Video is ${mb.toFixed(1)} MB. Please keep under ${MAX_MB} MB.`);
      onProgress(10, "Reading video...");
      const b64 = await readBase64(file);
      onProgress(45, "Sending to Gemini AI...");
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [
              { inlineData: { mimeType: file.type || "video/mp4", data: b64 } },
              { text: prompt },
            ]}],
            generationConfig: { temperature: 0.3, maxOutputTokens: 4096 },
          }),
        }
      );
      onProgress(88, "Generating report...");
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `Gemini error (${res.status}) — check your API key.`);
      }
      const data = await res.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error("No analysis returned. Verify your API key.");
      return text;
    }

    /* ─── Unified analyze ─── */
    async function analyzeVideo(provider, file, prompt, model, apiKey, onProgress) {
      if (provider === "openai")  return analyzeWithOpenAI(file, prompt, model, apiKey, onProgress);
      if (provider === "groq")    return analyzeWithGroq(file, prompt, model, apiKey, onProgress);
      return analyzeWithGemini(file, prompt, model, apiKey, onProgress);
    }

    /* ─── Markdown Renderer ─── */
    function Inline({ t }) {
      const parts = t.split(/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g);
      return (
        <>{parts.map((p,i) => {
          if (p.startsWith("**")&&p.endsWith("**")) return <strong key={i} className="text-white font-semibold">{p.slice(2,-2)}</strong>;
          if (p.startsWith("*") &&p.endsWith("*"))  return <em key={i} className="text-blue-300 not-italic">{p.slice(1,-1)}</em>;
          if (p.startsWith("`") &&p.endsWith("`"))  return <code key={i} className="text-green-300 bg-slate-800 px-1 rounded text-xs">{p.slice(1,-1)}</code>;
          return <span key={i}>{p}</span>;
        })}</>
      );
    }
    function MdReport({ content }) {
      return (
        <div className="space-y-0.5">
          {content.split("\n").map((line,i) => {
            if (line.startsWith("# "))   return <h1 key={i} className="text-2xl font-bold text-blue-400 mt-7 mb-3 pb-2 border-b border-slate-700">{line.slice(2)}</h1>;
            if (line.startsWith("## "))  return <h2 key={i} className="text-base font-semibold text-blue-300 mt-6 mb-2 flex items-center gap-2"><Ic.Right/>{line.slice(3)}</h2>;
            if (line.startsWith("### ")) return <h3 key={i} className="text-sm font-semibold text-purple-300 mt-4 mb-1">{line.slice(4)}</h3>;
            if (line.match(/^[-*] /))    return <div key={i} className="flex gap-2 ml-4 my-0.5"><span className="text-blue-400 text-xs mt-1 shrink-0">•</span><p className="text-slate-300 text-sm leading-relaxed"><Inline t={line.slice(2)}/></p></div>;
            if (line.startsWith("---"))  return <hr key={i} className="border-slate-700 my-4"/>;
            if (!line.trim())            return <div key={i} className="h-1.5"/>;
            return <p key={i} className="text-slate-300 text-sm leading-relaxed"><Inline t={line}/></p>;
          })}
        </div>
      );
    }

    /* ─── Progress Bar ─── */
    function ProgressBar({ pct, msg }) {
      return (
        <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
          <div className="flex items-center gap-2 mb-3">
            <div className="spin w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full shrink-0"/>
            <span className="text-sm text-blue-300 font-medium">{msg}</span>
          </div>
          <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
            <div className="h-full bg-gradient-to-r from-blue-600 to-blue-400 rounded-full transition-all duration-500" style={{width:`${pct}%`}}/>
          </div>
          <p className="text-xs text-slate-500 mt-1.5">{pct}% complete</p>
        </div>
      );
    }

    /* ─── Main App ─── */
    function App() {
      const [provider,     setProvider]     = useState("openai");
      const [apiKey,       setApiKey]       = useState("");
      const [showKey,      setShowKey]      = useState(false);
      const [model,        setModel]        = useState("gpt-4o");
      const [profileName,  setProfileName]  = useState("");
      const [viewType,     setViewType]     = useState("Side View (Left)");
      const [customPrompt, setCustomPrompt] = useState("");
      const [mode,         setMode]         = useState("full");
      const [videoFile,    setVideoFile]    = useState(null);
      const [previewUrl,   setPreviewUrl]   = useState(null);
      const [dragging,     setDragging]     = useState(false);
      const [analyzing,    setAnalyzing]    = useState(false);
      const [pct,          setPct]          = useState(0);
      const [pctMsg,       setPctMsg]       = useState("");
      const [result,       setResult]       = useState(null);
      const [error,        setError]        = useState(null);
      const fileRef = useRef(null);

      const switchProvider = (p) => {
        setProvider(p);
        setModel(MODELS[p][0].id);
        setApiKey("");
        setError(null);
      };

      const applyFile = useCallback((file) => {
        if (!file || !file.type.startsWith("video/")) { setError("Please upload a valid video file."); return; }
        setVideoFile(file); setPreviewUrl(URL.createObjectURL(file));
        setResult(null); setError(null);
      }, []);

      const onDrop = useCallback((e) => { e.preventDefault(); setDragging(false); applyFile(e.dataTransfer.files[0]); }, [applyFile]);

      const handleReset = () => {
        setVideoFile(null); setPreviewUrl(null); setResult(null);
        setError(null); setPct(0); setPctMsg("");
      };

      const handleAnalyze = async () => {
        if (!apiKey.trim()) { setError("Enter your API key."); return; }
        if (!videoFile)     { setError("Upload a walking video first."); return; }
        setAnalyzing(true); setError(null); setResult(null);
        const onP = (p,m) => { setPct(p); setPctMsg(m); };
        try {
          const prompt = mode === "full"
            ? fullReportPrompt(profileName, videoFile.name, viewType, customPrompt)
            : quickCoachPrompt(profileName, videoFile.name, viewType, customPrompt);
          const text = await analyzeVideo(provider, videoFile, prompt, model, apiKey.trim(), onP);
          setPct(100); setPctMsg("Done!");
          setResult({ text, mode, file: videoFile.name, profile: profileName, ts: new Date().toLocaleString(), provider });
        } catch(e) {
          setError(e.message || "Something went wrong. Please try again.");
        } finally { setAnalyzing(false); }
      };

      const download = () => {
        const b = new Blob([result.text], { type: "text/markdown" });
        const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(b), download: `gait-report-${Date.now()}.md` });
        a.click();
      };

      const prov = PROVIDERS.find(p => p.id === provider);

      /* ── RESULTS ── */
      if (result) return (
        <div className="min-h-screen bg-slate-950">
          <header className="bg-slate-900/90 border-b border-slate-800 sticky top-0 z-10 backdrop-blur">
            <div className="max-w-5xl mx-auto px-5 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center"><Ic.Activity c="w-5 h-5 text-white"/></div>
                <div><h1 className="text-base font-bold leading-tight">Walking Posture AI</h1><p className="text-xs text-slate-400">Powered by {result.provider === "openai" ? "OpenAI GPT-4o" : result.provider === "groq" ? "Groq Llama Vision" : "Google Gemini"}</p></div>
              </div>
            </div>
          </header>
          <main className="max-w-5xl mx-auto px-5 py-8 space-y-6">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
              <div>
                <h2 className="text-xl font-bold">{result.mode==="quick" ? "⚡ Quick Coach Feedback" : "📋 Full Gait Analysis Report"}</h2>
                <div className="flex flex-wrap items-center gap-2 mt-1 text-xs text-slate-400">
                  {result.profile && <><span className="flex items-center gap-1"><Ic.User c="w-3 h-3"/> {result.profile}</span><span className="text-slate-600">·</span></>}
                  <span className="flex items-center gap-1"><Ic.Video c="w-3 h-3"/> {result.file}</span>
                  <span className="text-slate-600">·</span>
                  <span className="flex items-center gap-1"><Ic.Clock/> {result.ts}</span>
                </div>
              </div>
              <div className="flex gap-2 shrink-0">
                <button onClick={handleReset} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 transition-colors px-4 py-2 rounded-xl text-sm font-medium"><Ic.Refresh c="w-4 h-4"/> New Analysis</button>
                {result.mode==="full" && <button onClick={download} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 transition-colors px-4 py-2 rounded-xl text-sm font-medium"><Ic.Download c="w-4 h-4"/> Download</button>}
              </div>
            </div>
            {result.mode==="quick" ? (
              <div className="bg-gradient-to-br from-slate-900 to-slate-800/60 rounded-2xl p-7 border border-green-500/20">
                <div className="flex gap-4">
                  <div className="w-11 h-11 bg-green-500/15 rounded-2xl flex items-center justify-center shrink-0"><Ic.Zap c="w-6 h-6 text-green-400"/></div>
                  <div><p className="text-xs text-green-400 font-semibold uppercase tracking-wider mb-2">Coaching Feedback</p><p className="text-slate-100 leading-relaxed text-base">{result.text}</p></div>
                </div>
              </div>
            ) : (
              <div className="bg-slate-900 rounded-2xl p-6 sm:p-8 border border-slate-800"><MdReport content={result.text}/></div>
            )}
            <div className="flex flex-wrap gap-3 pt-2">
              <button onClick={handleReset} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 transition-colors px-5 py-2.5 rounded-xl text-sm font-medium"><Ic.Refresh c="w-4 h-4"/> Analyze Another</button>
              {result.mode==="full" && <button onClick={download} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 transition-colors px-5 py-2.5 rounded-xl text-sm font-medium"><Ic.Download c="w-4 h-4"/> Download (.md)</button>}
            </div>
          </main>
          <footer className="border-t border-slate-800/50 mt-10 py-5 text-center"><p className="text-xs text-slate-600">Walking Posture AI · For informational purposes only · Not a substitute for medical advice</p></footer>
        </div>
      );

      /* ── SETUP ── */
      return (
        <div className="min-h-screen bg-slate-950">
          <header className="bg-slate-900/90 border-b border-slate-800 sticky top-0 z-10 backdrop-blur">
            <div className="max-w-5xl mx-auto px-5 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center"><Ic.Activity c="w-5 h-5 text-white"/></div>
                <div><h1 className="text-base font-bold leading-tight">Walking Posture AI</h1><p className="text-xs text-slate-400">Clinical Biomechanics Analysis</p></div>
              </div>
              <span className="hidden sm:block text-xs text-slate-500 bg-slate-800 px-3 py-1 rounded-full">GPT-4o · Groq · Gemini</span>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-5 py-8">
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">

              {/* LEFT */}
              <div className="space-y-4">

                {/* Provider Toggle */}
                <div className="bg-slate-900 rounded-2xl p-5 border border-slate-800">
                  <div className="flex items-center gap-2 mb-4"><Ic.Key c="w-4 h-4 text-blue-400"/><h3 className="font-semibold text-sm">API Configuration</h3></div>

                  {/* Provider selector */}
                  <div className="grid grid-cols-2 gap-2 mb-4">
                    {PROVIDERS.map(p => (
                      <button key={p.id} onClick={() => switchProvider(p.id)}
                        className={`p-3 rounded-xl border text-left transition-all ${provider===p.id ? `${p.border} ${p.bg}` : "border-slate-700 bg-slate-800 hover:border-slate-600"}`}>
                        <div className={`font-semibold text-sm ${provider===p.id ? p.color : "text-slate-300"}`}>{p.label}</div>
                        <div className="text-xs text-slate-500 mt-0.5">{p.hint}</div>
                      </button>
                    ))}
                  </div>

                  <div className="space-y-3">
                    <div>
                      <label className="block text-xs text-slate-400 mb-1.5">{prov.label} API Key <span className="text-red-400">*</span></label>
                      <div className="relative">
                        <input type={showKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)}
                          placeholder={prov.hint}
                          className="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 pr-10 transition-colors"/>
                        <button onClick={()=>setShowKey(!showKey)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white">
                          {showKey ? <Ic.EyeOff/> : <Ic.Eye/>}
                        </button>
                      </div>
                      <p className="text-xs text-slate-500 mt-1.5">
                        {provider==="openai"
                          ? <span>Get key at <a href="https://platform.openai.com/api-keys" target="_blank" className="text-green-400 hover:underline">platform.openai.com/api-keys</a></span>
                          : provider==="groq"
                          ? <span>Free key at <a href="https://console.groq.com/keys" target="_blank" className="text-orange-400 hover:underline">console.groq.com/keys</a></span>
                          : <span>Get key at <a href="https://aistudio.google.com" target="_blank" className="text-blue-400 hover:underline">aistudio.google.com</a></span>
                        }
                      </p>
                    </div>
                    <div>
                      <label className="block text-xs text-slate-400 mb-1.5">Model</label>
                      <select value={model} onChange={e=>setModel(e.target.value)}
                        className="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500">
                        {MODELS[provider].map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
                      </select>
                    </div>
                  </div>
                </div>

                {/* Profile */}
                <div className="bg-slate-900 rounded-2xl p-5 border border-slate-800">
                  <div className="flex items-center gap-2 mb-4"><Ic.User c="w-4 h-4 text-purple-400"/><h3 className="font-semibold text-sm">Profile & Settings</h3></div>
                  <div className="space-y-3">
                    <div>
                      <label className="block text-xs text-slate-400 mb-1.5">Profile Name</label>
                      <input type="text" value={profileName} onChange={e=>setProfileName(e.target.value)} placeholder="e.g. John Doe"
                        className="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500"/>
                    </div>
                    <div>
                      <label className="block text-xs text-slate-400 mb-1.5">Camera View Type</label>
                      <select value={viewType} onChange={e=>setViewType(e.target.value)}
                        className="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500">
                        {VIEW_TYPES.map(v=><option key={v} value={v}>{v}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs text-slate-400 mb-1.5">Custom Instructions <span className="text-slate-600">(optional)</span></label>
                      <textarea value={customPrompt} onChange={e=>setCustomPrompt(e.target.value)}
                        placeholder="e.g. Focus on knee tracking. I have a history of lower back pain."
                        rows={3} className="w-full bg-slate-800 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 resize-none"/>
                    </div>
                  </div>
                </div>

                {/* Mode */}
                <div className="bg-slate-900 rounded-2xl p-5 border border-slate-800">
                  <div className="flex items-center gap-2 mb-3"><Ic.Zap c="w-4 h-4 text-yellow-400"/><h3 className="font-semibold text-sm">Analysis Mode</h3></div>
                  <div className="grid grid-cols-2 gap-2">
                    {[{id:"full",label:"Full Report",sub:"8-section deep analysis",border:"border-blue-500",bg:"bg-blue-500/10",text:"text-blue-300"},
                      {id:"quick",label:"Quick Coach",sub:"2–3 sentence feedback",border:"border-green-500",bg:"bg-green-500/10",text:"text-green-300"}
                    ].map(opt=>(
                      <button key={opt.id} onClick={()=>setMode(opt.id)}
                        className={`p-3.5 rounded-xl border text-left transition-all ${mode===opt.id?`${opt.border} ${opt.bg}`:"border-slate-700 bg-slate-800 hover:border-slate-600"}`}>
                        <div className={`font-semibold text-sm ${mode===opt.id?opt.text:"text-slate-300"}`}>{opt.label}</div>
                        <div className="text-xs text-slate-500 mt-0.5">{opt.sub}</div>
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              {/* RIGHT */}
              <div className="space-y-4">
                {/* Upload */}
                <div
                  className={`bg-slate-900 rounded-2xl border-2 border-dashed transition-all ${dragging?"border-blue-400 bg-blue-500/5":videoFile?"border-blue-500/40":"border-slate-700 hover:border-slate-500"} ${!videoFile?"cursor-pointer":""}`}
                  onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={onDrop}
                  onClick={()=>!videoFile&&fileRef.current?.click()}>
                  <input ref={fileRef} type="file" accept="video/*" className="hidden" onChange={e=>applyFile(e.target.files[0])}/>
                  {videoFile ? (
                    <div className="p-4">
                      <video src={previewUrl} className="w-full rounded-xl max-h-64 object-cover bg-black" controls muted/>
                      <div className="flex items-center justify-between mt-3 px-1">
                        <div className="flex items-center gap-2 min-w-0">
                          <Ic.Video c="w-4 h-4 text-blue-400 shrink-0"/>
                          <div className="min-w-0">
                            <div className="text-sm font-medium truncate text-slate-200">{videoFile.name}</div>
                            <div className="text-xs text-slate-500">{(videoFile.size/1024/1024).toFixed(1)} MB · {videoFile.type}</div>
                          </div>
                        </div>
                        <button onClick={e=>{e.stopPropagation();handleReset();}} className="text-xs text-slate-500 hover:text-red-400 transition-colors shrink-0 ml-3">Remove</button>
                      </div>
                    </div>
                  ) : (
                    <div className="flex flex-col items-center justify-center py-14 px-6 text-center">
                      <div className="w-16 h-16 rounded-2xl bg-slate-800 flex items-center justify-center mb-4"><Ic.Upload c="w-7 h-7 text-slate-400"/></div>
                      <p className="text-slate-200 font-medium mb-1">{dragging?"Drop video here":"Drop your walking video here"}</p>
                      <p className="text-slate-500 text-sm">or click to browse files</p>
                      <p className="text-slate-600 text-xs mt-3">
                        {provider==="openai" ? "MP4, MOV, WebM · Any size · 16 frames extracted" : provider==="groq" ? "MP4, MOV, WebM · Any size · 8 frames extracted" : "MP4, MOV, WebM · Max 20 MB · Trim to ~15 sec"}
                      </p>
                    </div>
                  )}
                </div>

                {/* Tips */}
                {!videoFile && (
                  <div className="bg-slate-900/50 rounded-xl p-4 border border-slate-800/50">
                    <p className="text-xs font-medium text-slate-400 mb-2">📹 Tips for best results</p>
                    <div className="grid grid-cols-2 gap-x-4 gap-y-1">
                      {["Film full body head-to-toe","Walk at a natural pace","Record 10–20 seconds","Good lighting, stable camera"].map(tip=>(
                        <div key={tip} className="flex items-start gap-1.5">
                          <Ic.Check c="w-3 h-3 text-green-500 shrink-0 mt-0.5"/>
                          <span className="text-xs text-slate-500">{tip}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {error && (
                  <div className="bg-red-900/20 border border-red-800/40 rounded-xl p-4 flex gap-3">
                    <Ic.Alert c="w-5 h-5 text-red-400 shrink-0 mt-0.5"/>
                    <p className="text-sm text-red-300">{error}</p>
                  </div>
                )}

                {analyzing && <ProgressBar pct={pct} msg={pctMsg}/>}

                <button onClick={handleAnalyze}
                  disabled={analyzing||!videoFile||!apiKey.trim()}
                  className={`w-full py-4 rounded-2xl font-semibold text-base transition-all flex items-center justify-center gap-3 ${analyzing||!videoFile||!apiKey.trim()?"bg-slate-800 text-slate-500 cursor-not-allowed":"bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-500/20"}`}>
                  {analyzing
                    ? <><div className="spin w-5 h-5 border-2 border-white/30 border-t-white rounded-full"/> Analyzing...</>
                    : <><Ic.Activity c="w-5 h-5"/> Analyze Walking Pattern</>
                  }
                </button>

                {!apiKey.trim() && <p className="text-center text-xs text-slate-500">↑ Enter your {prov.label} API key to start</p>}
                {apiKey.trim()&&!videoFile && <p className="text-center text-xs text-slate-500">↑ Upload a walking video to continue</p>}
              </div>
            </div>
          </main>
          <footer className="border-t border-slate-800/50 mt-12 py-5 text-center">
            <p className="text-xs text-slate-600">Walking Posture AI · For informational purposes only · Not a substitute for medical advice</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
